name: publish
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
      # Publish via `pnpm publish` (not `npm publish`): packages/build now depends on
      # @stravica-ai/rcf-lite-core via `workspace:*`, and pnpm rewrites the workspace
      # protocol to the resolved version at pack time. `npm publish` does NOT rewrite
      # `workspace:*`, so it would ship a literal, unresolvable `workspace:*` version
      # spec to consumers (spec §7.5 armed-footgun). `--provenance` is requested to keep
      # provenance/trusted-publishing (OIDC); the trusted-publisher binding is repo +
      # workflow-filename (this file is unchanged), not path, so publishing packages/build
      # keeps the same binding. `--no-git-checks` because a tag build is a detached HEAD.
      #   NOTE (release-train precondition, out of v1 scope): the FIRST real publish must
      #   confirm OIDC trusted publishing works under pnpm 9 (the prior npm-based flow
      #   relied on npm >= 11.5.1's OIDC support). Nothing is tagged/published in v1, so
      #   this switch is inert now and only removes the workspace:* footgun.
      # Dist-tag is derived from the pushed git tag: a prerelease identifier (a "-" in the
      # tag, e.g. v0.2.2-rebind-test.0) publishes under the `prerelease` dist-tag; a plain
      # release tag (e.g. v0.2.2) publishes under the default `latest`. This prevents a
      # prerelease from ever clobbering `latest`.
      - name: Publish package
        working-directory: packages/build
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            echo "Prerelease tag detected ($TAG) -> publishing under dist-tag 'prerelease'"
            pnpm publish --provenance --access public --tag prerelease --no-git-checks
          else
            echo "Release tag ($TAG) -> publishing under default dist-tag 'latest'"
            pnpm publish --provenance --access public --no-git-checks
          fi
