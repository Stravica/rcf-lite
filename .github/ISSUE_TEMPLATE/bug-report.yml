name: Bug report
description: Report a defect in RCF Build Lite
labels: [bug]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, and the state of the RCF tree if relevant.
      placeholder: |
        1. rcf init
        2. rcf prd add ...
        3. rcf view
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened, including any error output.
    validations:
      required: true
  - type: input
    id: rcf-version
    attributes:
      label: RCF Build Lite version
      description: Output of `rcf --version`.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v24.x.x
    validations:
      required: true
